services:
  # aihomeserver
  aihomeserver:
    build: .
    restart: unless-stopped
    env_file:
      - ./secrets.env
    ports:
      - target: 3000
        published: "${AIHOMESERVER_HOST_PORT:-3000}"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - ai_data:/data
      - ai_workspace:/data/workspace
    environment:
      DATA_DIR: /data
      PORT: "3000"
      # Repo root for `/learn/*` read-only browser (Dockerfile copies sources to /repo)
      REPO_ROOT: "/repo"
      # Workspace root for filesystem/shell tools (matches mounted volume below)
      WORKSPACE: "/data/workspace"
      # Point at your Ollama instance.
      # If Ollama runs on the Docker host machine use host.docker.internal:
      OLLAMA_URL: "http://host.docker.internal:11434"
      WORKER_URL: "${WORKER_URL:-http://worker:3031}"
      EXECUTION_MODE: "${EXECUTION_MODE:-remote}"
      # Route web searches through the SearXNG container (preferred; avoids scraping)
      SEARCH_URL: "http://searxng:8080"
    extra_hosts:
      # Lets containers reach the host machine by name (works on Linux too)
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng

  # Remote execution worker using the same image, different role
  worker:
    build: .
    restart: unless-stopped
    profiles:
      - worker
    volumes:
      - ai_worker_workspace:/workspace
    ports:
      - "127.0.0.1:3031:3031"
    environment:
      ROLE: worker
      WORKER_WORKSPACE: /workspace
      WORKER_PORT: "3031"
      WORKER_TOKEN: ${WORKER_TOKEN:-}
    expose:
      - "3031"

  # SearXNG (self-hosted search)
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    # Reachable by `aihomeserver` in the Docker network at http://searxng:8080
    expose:
      - "8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

volumes:
  ai_data:
  ai_workspace:
  ai_worker_workspace:
