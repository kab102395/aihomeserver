services:
  # Dev/test runner: binds the repo into the container and runs `cargo run`.
  # This gives the AI a consistent Linux environment with cargo/rg/git available
  # and full visibility into your project tree at /workspace.
  aihomeserver:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - target: 3000
        published: "${AIHOMESERVER_HOST_PORT:-3000}"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - ai_data:/data
      - ./:/workspace:rw
    environment:
      DATA_DIR: /data
      PORT: "3000"
      REPO_ROOT: "/workspace"
      WORKSPACE: "/workspace"
      OLLAMA_URL: "http://host.docker.internal:11434"
      WORKER_URL: "${WORKER_URL:-}"
      WORKER_TOKEN: "${WORKER_TOKEN:-}"
      EXECUTION_MODE: "${EXECUTION_MODE:-auto}"
      SEARCH_URL: "http://searxng:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng

volumes:
  ai_data:
