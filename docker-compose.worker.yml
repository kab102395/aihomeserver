services:
  worker:
    build: .
    restart: unless-stopped
    ports:
      - "3031:3031"
    volumes:
      - ai_worker_workspace:/workspace
    environment:
      ROLE: worker
      WORKER_WORKSPACE: /workspace
      WORKER_PORT: "3031"
      WORKER_TOKEN: ${WORKER_TOKEN:-}

volumes:
  ai_worker_workspace:
