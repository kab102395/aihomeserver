<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aihomeserver Â· Learn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #111;
      --surface: #171717;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e8e6e3;
      --muted: #9a9a9a;
      --dim: #6a6a6a;
      --accent: #c97b4b;
      --accent-soft: rgba(201,123,75,0.15);
      --danger: #c05050;
      --ok: #4a9a5a;
      --radius: 10px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: -apple-system, "Segoe UI", system-ui, sans-serif;
      --nav-w: 320px;
    }
    body {
      margin: 0;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      overflow: hidden;
      line-height: 1.55;
    }
    a { color: inherit; }
    button, input { font: inherit; }

    #nav {
      width: var(--nav-w);
      min-width: 240px;
      max-width: 520px;
      background: #0f0f0f;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #navHeader {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    #brandRow {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    #brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    #brandTitle {
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #brandSub {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 5px 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .pill:hover { background: var(--surface2); color: var(--text); border-color: #333; }
    .pillDot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
    .pillDot.ok { background: var(--ok); }
    .pillDot.bad { background: var(--danger); }

    #navTabs {
      display: flex;
      gap: 8px;
      padding: 10px 14px 12px;
    }
    .tabBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.12s;
      font-size: 12px;
    }
    .tabBtn:hover { background: var(--surface2); color: var(--text); }
    .tabBtn.active { background: var(--accent-soft); border-color: rgba(201,123,75,0.35); color: var(--text); }

    #navBody {
      flex: 1;
      overflow: auto;
      padding: 10px 10px 14px;
    }
    .groupTitle {
      padding: 10px 8px 6px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .navItem {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      transition: background 0.1s, color 0.1s;
    }
    .navItem:hover { background: var(--surface2); color: var(--text); }
    .navItem.active { background: var(--surface2); color: var(--text); border: 1px solid rgba(201,123,75,0.25); }
    .navItem .hint { font-size: 11px; color: var(--dim); white-space: nowrap; }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      gap: 12px;
    }
    #topbarLeft {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    #pageTitle {
      font-weight: 650;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #topbarRight {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .linkBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.12s;
      font-size: 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .linkBtn:hover { background: var(--surface2); color: var(--text); }
    .linkBtn.primary { border-color: rgba(201,123,75,0.35); background: var(--accent-soft); color: var(--text); }

    #content {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h2 { margin: 0 0 8px 0; font-size: 15px; }
    .card h3 { margin: 14px 0 8px 0; font-size: 13px; color: var(--text); }
    .card p { margin: 8px 0; color: var(--muted); }
    .card ul { margin: 8px 0 0 18px; color: var(--muted); }
    .md h1, .md h2, .md h3, .md h4 { color: var(--text); margin: 12px 0 8px; line-height: 1.25; }
    .md h1 { font-size: 18px; }
    .md h2 { font-size: 16px; }
    .md h3 { font-size: 14px; }
    .md p { color: var(--muted); margin: 8px 0; }
    .md code {
      font-family: var(--mono);
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      padding: 1px 6px;
      border-radius: 6px;
      color: #d8d8d8;
    }
    .md pre {
      font-family: var(--mono);
      font-size: 12px;
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      white-space: pre;
      color: #d8d8d8;
      margin: 10px 0;
    }
    .md a { color: #d9b39b; text-decoration: underline; text-decoration-color: rgba(201,123,75,0.35); }
    .md blockquote {
      margin: 10px 0;
      border-left: 3px solid rgba(201,123,75,0.35);
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      color: var(--muted);
    }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .md .docMeta { display:flex; gap:8px; flex-wrap:wrap; margin: 8px 0 10px; }
    .kbd {
      font-family: var(--mono);
      font-size: 12px;
      padding: 1px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
    }
    .code {
      font-family: var(--mono);
      font-size: 12px;
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      white-space: pre;
      color: #d8d8d8;
    }
    .code .ln { display: inline-block; width: 52px; color: #666; user-select: none; }
    .mutedRow { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
    }
    .tag strong { color: var(--text); font-weight: 600; }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 1000px) {
      #nav { width: 280px; }
      .split { grid-template-columns: 1fr; }
    }

    /* Browser */
    #browserTop {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      outline: none;
      min-width: 240px;
    }
    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.12s;
      font-size: 12px;
    }
    .btn:hover { background: #232323; color: var(--text); }
    .btn.primary { border-color: rgba(201,123,75,0.35); background: var(--accent-soft); color: var(--text); }
    .btn.danger:hover { color: var(--danger); }
    #tree {
      border: 1px solid var(--border);
      background: #101010;
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      max-height: 44dvh;
    }
    .treeRow {
      font-family: var(--mono);
      font-size: 12px;
      color: #bdbdbd;
      padding: 4px 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .treeRow:hover { background: #1a1a1a; }
    .treeIcon { width: 16px; color: #888; text-align: center; }
    .treePath { color: #777; margin-left: auto; font-size: 11px; }
    .treeIndent { width: 12px; flex-shrink: 0; }
    .treeRow.active { background: rgba(201,123,75,0.10); border: 1px solid rgba(201,123,75,0.25); }

    #results {
      border: 1px solid var(--border);
      background: #101010;
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      max-height: 22dvh;
    }
    .hit {
      font-family: var(--mono);
      font-size: 12px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      color: #bdbdbd;
      border: 1px solid transparent;
      display: flex;
      gap: 10px;
      align-items: baseline;
    }
    .hit:hover { background: #1a1a1a; border-color: #222; }
    .hit .file { color: #cfcfcf; }
    .hit .line { color: #777; }
    .hit .prev { color: #9a9a9a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    #fileHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    #filePath {
      font-family: var(--mono);
      font-size: 12px;
      color: #bdbdbd;
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 220px;
    }
    .note {
      font-size: 12px;
      color: var(--dim);
      margin-top: 8px;
    }
    .outline {
      border: 1px solid var(--border);
      background: #101010;
      border-radius: 10px;
      padding: 10px;
      max-height: 26dvh;
      overflow: auto;
      font-family: var(--mono);
      font-size: 12px;
      color: #bdbdbd;
    }
    .outlineItem {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 5px 6px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .outlineItem:hover { background: #1a1a1a; border-color: #222; }
    .outlineKind { color: #777; width: 56px; flex-shrink: 0; }
    .outlineName { color: #d0d0d0; overflow:hidden; text-overflow: ellipsis; white-space: nowrap; }
    .outlineLine { color: #777; margin-left: auto; flex-shrink: 0; }
    details summary {
      cursor: pointer;
      user-select: none;
      color: var(--text);
      font-weight: 600;
      margin: 6px 0;
    }
    details p, details ul { color: var(--muted); }
  </style>
</head>
<body>
  <aside id="nav">
    <div id="navHeader">
      <div id="brandRow">
        <div id="brand">
          <div id="brandTitle">aihomeserver Â· Learn</div>
          <div id="brandSub">Interview-mode walkthrough</div>
        </div>
        <div class="pill" id="statusPill" title="Click to refresh status">
          <span class="pillDot" id="statusDot"></span>
          <span id="statusText">offline</span>
        </div>
      </div>
      <div id="navTabs">
        <button class="tabBtn active" id="tab-tour">Tour</button>
        <button class="tabBtn" id="tab-code">Code</button>
      </div>
    </div>
    <div id="navBody">
      <div id="tourNav"></div>
      <div id="codeNav" style="display:none"></div>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <div id="topbarLeft">
        <div id="pageTitle">Overview</div>
      </div>
      <div id="topbarRight">
        <a class="linkBtn" href="/" title="Back to chat UI">Chat UI</a>
        <button class="linkBtn" id="copyLinkBtn" title="Copy link to current section">Copy link</button>
        <button class="linkBtn primary" id="exportBtn" title="Export an interview cheat sheet">Export cheat sheet</button>
      </div>
    </div>
    <div id="content"></div>
  </main>

  <script>
    /**
     * /learn is a tiny, dependency-free single-page app.
     *
     * Design goals:
     * - fast to load (single HTML response)
     * - easy to scan (left nav → right content)
     * - “learning platform” behaviors: quick quizzes, labs you can run, and a code browser
     *
     * Everything is plain DOM + fetch() against the server’s `/learn/*` read-only endpoints.
     */

    /** Shorthand for `document.getElementById`. */
    const $ = (id) => document.getElementById(id);
    /**
     * HTML escape helper to prevent accidental HTML injection.
     * Use for any user/remote string that is inserted via `innerHTML`.
     */
    const esc = (s) => (s ?? '').toString()
      .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

    /**
     * Switch between the “Tour” and “Code” nav lists.
     * Content is still rendered into the same `#content` mount.
     */
    function setTab(which) {
      $('tab-tour').classList.toggle('active', which === 'tour');
      $('tab-code').classList.toggle('active', which === 'code');
      $('tourNav').parentElement.style.display = which === 'tour' ? '' : '';
      $('tourNav').style.display = which === 'tour' ? '' : 'none';
      $('codeNav').style.display = which === 'code' ? '' : 'none';
    }

    // ---------- Status ----------
    /**
     * Pings `/health` to show an “online/offline” indicator and server version.
     * This is intentionally simple: it’s a quick sanity check for demos.
     */
    async function refreshStatus() {
      const dot = $('statusDot');
      const txt = $('statusText');
      dot.className = 'pillDot';
      txt.textContent = 'checkingâ€¦';
      try {
        const r = await fetch('/health');
        if (!r.ok) throw new Error('health ' + r.status);
        const d = await r.json();
        dot.classList.add('ok');
        txt.textContent = 'online v' + (d.version ?? '?');
      } catch (e) {
        dot.classList.add('bad');
        txt.textContent = 'offline';
      }
    }
    $('statusPill').onclick = refreshStatus;

    // ---------- Navigation ----------
    const TOUR_GROUPS = [
      { title: 'Core', items: [
        { id: 'overview', title: 'Overview', hint: '10 min demo script' },
        { id: 'architecture', title: 'Architecture', hint: 'layers + dataflow' },
        { id: 'orchestrator', title: 'Orchestrator', hint: 'nodes + loop' },
        { id: 'tools', title: 'Tools + Safety', hint: 'guardrails' },
        { id: 'memory', title: 'Memory + Storage', hint: 'SQLite + sources' },
        { id: 'api', title: 'HTTP API Tour', hint: 'endpoints' },
      ]},
      { title: 'Lessons (Start Here)', items: [
        { id: 'lesson_trace', title: 'Trace a Request', hint: 'follow the code path' },
        { id: 'lesson_rust', title: 'Rust in this Repo', hint: 'what you must know' },
        { id: 'lesson_async', title: 'Async + Concurrency', hint: 'tokio patterns' },
        { id: 'lesson_axum', title: 'Axum HTTP Basics', hint: 'routes + state' },
        { id: 'lesson_tools', title: 'Tools + Results', hint: 'I/O + safety' },
        { id: 'lesson_memory', title: 'SQLite Memory', hint: 'schemas + sqlx' },
        { id: 'lesson_grounding', title: 'Grounding Contract', hint: 'facts + sources' },
      ]},
      { title: 'Interview', items: [
        { id: 'talktrack', title: 'Talk Track', hint: 'what to say' },
        { id: 'questions', title: 'Common Questions', hint: 'Q&A' },
        { id: 'checklist', title: 'Demo Checklist', hint: 'runbook' },
      ]},
      { title: 'Interactive', items: [
        { id: 'diagnostics', title: 'Diagnostics', hint: 'evals + deep health' },
        { id: 'metrics', title: 'Metrics', hint: 'latency + counters' },
        { id: 'replay', title: 'Run Replay', hint: 'history â†’ plan â†’ artifacts' },
        { id: 'glossary', title: 'Glossary', hint: 'terms + anchors' },
        { id: 'labs', title: 'Hands-on Labs', hint: 'practice prompts' },
      ]},
      { title: 'Repo Docs', items: [
        { id: 'doc_readme', title: 'README.md', hint: 'quickstart' },
        { id: 'doc_design', title: 'DESIGN.md', hint: 'deep dive' },
        { id: 'doc_roadmap', title: 'UI roadmap', hint: 'product' },
        { id: 'doc_next', title: 'NEXT_STEPS', hint: 'execution' },
        { id: 'doc_progress', title: 'PROGRESS', hint: 'status' },
      ]},
    ];

    const CODE_GROUPS = [
      { title: 'Code Tour (Start Here)', items: [
        { id: 'code_main', title: 'src/main.rs', hint: 'startup wiring' },
        { id: 'code_server', title: 'src/api/server.rs', hint: 'routes + handlers' },
        { id: 'code_ui', title: 'src/api/ui.rs', hint: 'embedded UI' },
        { id: 'code_orch', title: 'src/orchestrator.rs', hint: 'state machine' },
        { id: 'code_executor', title: 'src/nodes/executor.rs', hint: 'step loop' },
        { id: 'code_tools', title: 'src/tools/', hint: 'tool registry' },
        { id: 'code_grounding', title: 'src/grounding.rs', hint: 'facts gate' },
        { id: 'code_config', title: 'src/config.rs', hint: 'runtime config' },
      ]},
      { title: 'Repo Browser', items: [
        { id: 'browser', title: 'Browse + Search', hint: '/learn/* endpoints' },
      ]},
    ];

    function renderNav(container, groups) {
      container.innerHTML = '';
      for (const g of groups) {
        const t = document.createElement('div');
        t.className = 'groupTitle';
        t.textContent = g.title;
        container.appendChild(t);
        for (const it of g.items) {
          const row = document.createElement('div');
          row.className = 'navItem';
          row.dataset.page = it.id;
          row.innerHTML = `<span>${esc(it.title)}</span><span class="hint">${esc(it.hint ?? '')}</span>`;
          row.onclick = () => navigate(it.id);
          container.appendChild(row);
        }
      }
    }

    renderNav($('tourNav'), TOUR_GROUPS);
    renderNav($('codeNav'), CODE_GROUPS);

    function setActiveNav(id) {
      for (const el of document.querySelectorAll('.navItem')) {
        el.classList.toggle('active', el.dataset.page === id);
      }
    }

    // ---------- Content ----------
    function setTitle(t) { $('pageTitle').textContent = t; }

    /**
     * GET helper for JSON endpoints.
     * All `/learn/*` data endpoints return JSON.
     */
    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${url} -> ${r.status}`);
      return await r.json();
    }

    /**
     * POST helper for JSON endpoints.
     *
     * Returns parsed JSON when possible; otherwise returns raw text.
     * On non-2xx, throws with a body snippet to make debugging easier.
     */
    async function postJson(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body ?? {}),
      });
      const txt = await r.text();
      let parsed = null;
      try { parsed = JSON.parse(txt); } catch (_) {}
      if (!r.ok) {
        const msg = parsed ? prettyJson(parsed) : txt;
        throw new Error(`${url} -> ${r.status}\n${msg}`);
      }
      return parsed ?? txt;
    }

    /** Promise-based sleep used for polling. */
    const sleep = (ms) => new Promise(res => setTimeout(res, ms));

    async function fetchText(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${url} -> ${r.status}`);
      return await r.text();
    }

    async function fetchFileAndOutline(path) {
      const [file, outline] = await Promise.all([
        fetchJson(`/learn/file?path=${encodeURIComponent(path)}`),
        fetchJson(`/learn/outline?path=${encodeURIComponent(path)}`).catch(() => ({ symbols: [] })),
      ]);
      return { file, outline };
    }

    function makeCard(title, html) {
      return `<div class="card"><h2>${esc(title)}</h2>${html}</div>`;
    }

    function mono(x) { return `<span class="kbd">${esc(x)}</span>`; }

    /**
     * Tiny Markdown-to-HTML renderer used for repo docs in `/learn`.
     *
     * Intentional constraints:
     * - supports just enough Markdown for READMEs (headings, lists, code fences, links)
     * - sanitizes URLs and escapes raw text (no arbitrary HTML passthrough)
     *
     * This is not a full Markdown parser; it’s a safe-ish viewer for local docs.
     */
    function mdToSafeHtml(md) {
      const src = (md ?? '').toString().replaceAll('\r\n', '\n');
      const lines = src.split('\n');
      const codeBlocks = [];
      const outLines = [];
      let inCode = false;
      let codeBuf = [];
      let codeLang = '';

      for (const line of lines) {
        const fence = line.trimStart().startsWith('```');
        if (fence) {
          if (!inCode) {
            inCode = true;
            codeLang = line.trim().slice(3).trim();
            codeBuf = [];
          } else {
            inCode = false;
            const idx = codeBlocks.length;
            codeBlocks.push({ code: codeBuf.join('\n'), lang: codeLang });
            outLines.push(`@@CODE_${idx}@@`);
            codeBuf = [];
            codeLang = '';
          }
          continue;
        }
        if (inCode) codeBuf.push(line);
        else outLines.push(line);
      }
      if (inCode) {
        const idx = codeBlocks.length;
        codeBlocks.push({ code: codeBuf.join('\n'), lang: codeLang });
        outLines.push(`@@CODE_${idx}@@`);
      }

      function sanitizeUrl(u) {
        const url = (u ?? '').toString().trim();
        if (!url) return null;
        if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) return url;
        return null;
      }

      function fmtInline(raw) {
        let s = esc(raw);
        s = s.replace(/`([^`]+)`/g, (m, g1) => `<code>${g1}</code>`);
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, text, url) => {
          const safe = sanitizeUrl(url);
          if (!safe) return text;
          return `<a href="${esc(safe)}" target="_blank" rel="noopener noreferrer">${text}</a>`;
        });
        return s;
      }

      const html = [];
      let i = 0;
      while (i < outLines.length) {
        const line = outLines[i];
        const t = (line ?? '').trim();
        if (!t) { i++; continue; }

        const mCode = t.match(/^@@CODE_(\d+)@@$/);
        if (mCode) {
          const idx = parseInt(mCode[1], 10);
          const blk = codeBlocks[idx] || { code: '', lang: '' };
          const label = blk.lang ? `<div class="note">language: <span class="kbd">${esc(blk.lang)}</span></div>` : '';
          html.push(`${label}<pre>${esc(blk.code)}</pre>`);
          i++;
          continue;
        }

        const mH = t.match(/^(#{1,4})\s+(.*)$/);
        if (mH) {
          const level = mH[1].length;
          const tag = `h${Math.min(4, Math.max(1, level))}`;
          html.push(`<${tag}>${fmtInline(mH[2])}</${tag}>`);
          i++;
          continue;
        }

        if (/^---+$/.test(t)) { html.push('<hr />'); i++; continue; }

        if (t.startsWith('>')) {
          const q = [];
          while (i < outLines.length && (outLines[i] ?? '').trim().startsWith('>')) {
            q.push((outLines[i] ?? '').trim().replace(/^>\s?/, ''));
            i++;
          }
          html.push(`<blockquote>${fmtInline(q.join('\\n'))}</blockquote>`);
          continue;
        }

        if (/^[-*+]\s+/.test(t)) {
          const items = [];
          while (i < outLines.length && /^\s*[-*+]\s+/.test(outLines[i] ?? '')) {
            items.push((outLines[i] ?? '').replace(/^\s*[-*+]\s+/, ''));
            i++;
          }
          html.push('<ul>' + items.map(x => `<li>${fmtInline(x)}</li>`).join('') + '</ul>');
          continue;
        }

        if (/^\d+\.\s+/.test(t)) {
          const items = [];
          while (i < outLines.length && /^\s*\d+\.\s+/.test(outLines[i] ?? '')) {
            items.push((outLines[i] ?? '').replace(/^\s*\d+\.\s+/, ''));
            i++;
          }
          html.push('<ol>' + items.map(x => `<li>${fmtInline(x)}</li>`).join('') + '</ol>');
          continue;
        }

        const p = [];
        while (i < outLines.length && (outLines[i] ?? '').trim()) {
          const nt = (outLines[i] ?? '').trim();
          if (/^@@CODE_\d+@@$/.test(nt) || /^(#{1,4})\s+/.test(nt) || /^---+$/.test(nt) || nt.startsWith('>') || /^[-*+]\s+/.test(nt) || /^\d+\.\s+/.test(nt)) break;
          p.push(outLines[i]);
          i++;
        }
        if (p.length) html.push('<p>' + fmtInline(p.join(' ').trim()) + '</p>');
        else i++;
      }

      return `<div class="md">${html.join('')}</div>`;
    }

    function bullets(items) {
      return `<ul>${items.map(x => `<li>${x}</li>`).join('')}</ul>`;
    }

    async function searchFirst(query, preferFilePrefix) {
      const j = await fetchJson(`/learn/search?q=${encodeURIComponent(query)}`);
      const matches = j.matches ?? [];
      if (!matches.length) return null;
      if (preferFilePrefix) {
        const m = matches.find(x => (x.file ?? '').startsWith(preferFilePrefix));
        if (m) return m;
      }
      return matches[0];
    }

    /**
     * “Jump” is a convenience used by lessons: search the repo for a string
     * and open the first match in the embedded file viewer.
     */
    async function jumpTo(query, preferFilePrefix) {
      const m = await searchFirst(query, preferFilePrefix);
      if (!m) throw new Error(`No matches for: ${query}`);
      await openRepoFile(m.file, m.line);
      return m;
    }

    function prettyJson(obj) {
      try { return JSON.stringify(obj, null, 2); } catch (_) { return String(obj); }
    }

    /**
     * Runs a practice prompt from the Labs page without leaving `/learn`.
     *
     * Flow:
     * 1) POST `/run` to start a background task.
     * 2) Poll `/task/:id/status` until it completes.
     * 3) Render the “answer” artifact (or raw artifacts) inline.
     *
     * This turns Labs into a loop: read → run → inspect → repeat.
     */
    async function runPracticePrompt(prompt, mountId) {
      const mount = document.getElementById(mountId);
      if (!mount) return;
      mount.innerHTML = `<div class="note">Starting...</div>`;
      try {
        const quick = await postJson('/run', { request: prompt, max_steps: 6 });
        const taskId = (quick?.task_id ?? '').toString();
        if (!taskId) throw new Error('Missing task_id');
        try { localStorage.setItem('learn_last_task_id', taskId); } catch (_) {}

        mount.innerHTML = `<div class="note">Running <span class="kbd">${esc(taskId)}</span>...</div>`;

        const started = Date.now();
        while (Date.now() - started < 240_000) {
          await sleep(900);
          const st = await fetchJson(`/task/${encodeURIComponent(taskId)}/status`);
          const status = (st?.status ?? '').toString();
          if (status === 'running') continue;
          if (status === 'failed') {
            mount.innerHTML = `<div class="card" style="margin:10px 0 0 0">
              <h3>Run failed</h3>
              <div class="code">${esc(st?.error ?? 'unknown error')}</div>
              <div class="mutedRow"><button class="btn" onclick="navigate('replay')">Open Run Replay</button></div>
            </div>`;
            return;
          }
          if (status === 'done') {
            const resp = st?.response ?? {};
            const artifacts = resp?.artifacts ?? {};
            const answer = (artifacts?.answer && typeof artifacts.answer === 'string') ? artifacts.answer : '';
            mount.innerHTML = `<div class="card" style="margin:10px 0 0 0">
              <h3>Run result</h3>
              <div class="mutedRow">
                ${taskBadge(!!resp?.success)}
                <span class="tag"><strong>duration</strong> ${esc(resp?.duration_ms ?? 0)}ms</span>
                <span class="tag"><strong>steps</strong> ${esc(resp?.steps_taken ?? 0)}</span>
                <span class="tag"><strong>repairs</strong> ${esc(resp?.repair_cycles ?? 0)}</span>
                <span class="tag"><strong>failures</strong> ${esc(resp?.failure_count ?? 0)}</span>
              </div>
              ${answer ? `<div class="code" style="margin-top:10px">${esc(answer)}</div>` : `<details style="margin-top:10px"><summary>Artifacts</summary><div class="code">${esc(prettyJson(artifacts))}</div></details>`}
              <div class="mutedRow" style="margin-top:10px">
                <button class="btn" onclick="copyText(${JSON.stringify(taskId)})">Copy task id</button>
                <button class="btn primary" onclick="navigate('replay')">Open Run Replay</button>
              </div>
            </div>`;
            return;
          }

          // Unexpected status; keep polling briefly.
        }
        mount.innerHTML = `<div class="note">Timed out waiting for the run to finish. Open Run Replay to check status.</div>`;
      } catch (e) {
        mount.innerHTML = `<div class="note">Failed: ${esc(e?.message ?? e)}</div>`;
      }
    }

      function renderPlan(plan) {
        if (!plan || !Array.isArray(plan.steps)) return `<div class="note">No plan captured.</div>`;
        const steps = plan.steps.map((s, idx) => {
          const tool = (s.tool_name || s.tool || '').toString();

          return `<li><span class="kbd">${n}</span> ${esc(desc)} ${tool ? `<span class="tag"><strong>tool</strong> ${esc(tool)}</span>` : ''}</li>`;

      }

      function renderArtifacts(obj) {
        if (!obj || typeof obj !== 'object') return `<div class="note">No artifacts.</div>`;
        const keys = Object.keys(obj).sort();
        const answer = (obj.answer && typeof obj.answer === 'string') ? obj.answer : '';
        const ev = Array.isArray(obj.event_log) ? obj.event_log : null;
        const toolKeys = keys.filter(k => k.endsWith('_result'));

        list.innerHTML = `<div class="note">Loadingâ€¦</div>`;

          } catch (_) {}

          list.innerHTML = `<div class="note">Failed: ${esc(e?.message ?? e)}</div>`;

    async function renderGlossary() {
      setTitle('Glossary');
      $('content').innerHTML = [
        makeCard('Use this to study', `
          <p>Memorize the â€œwhyâ€ for each term. In interviews, youâ€™re selling tradeoffs and invariants, not just features.</p>
        `),
        `<div class="card">
          <h2>Terms</h2>
          <div id="glossTop" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <input id="glossQ" class="input" placeholder="Filter termsâ€¦" />
            <button class="btn primary" id="glossClear">Clear</button>
          </div>
          <div id="glossList" style="margin-top:10px"></div>
        </div>`,
      ].join('');

      const q = $('glossQ');
      const list = $('glossList');

      function render(items) {
        if (!items.length) { list.innerHTML = `<div class="note">No matches.</div>`; return; }
        list.innerHTML = items.map(it => `
          <details style="margin-bottom:8px" open>
            <summary>${esc(it.term)} <span class="hint" style="margin-left:8px">${esc(it.why)}</span></summary>
            <p>${esc(it.body)}</p>
            ${it.open ? `<div class="mutedRow"><button class="btn" onclick="openRepoFile(${JSON.stringify(it.open)}, null)">Open ${esc(it.open)}</button></div>` : ''}
          </details>
        `).join('');
      }

      function filter() {
        const s = (q.value ?? '').toLowerCase().trim();
        const items = !s ? GLOSSARY : GLOSSARY.filter(it =>
          (it.term ?? '').toLowerCase().includes(s) ||
          (it.body ?? '').toLowerCase().includes(s) ||
          (it.why ?? '').toLowerCase().includes(s)
        );
        render(items);
      }

      q.oninput = filter;
      $('glossClear').onclick = () => { q.value = ''; filter(); };
      render(GLOSSARY);
    }

    const LABS = [
      {
        title: 'Tour the HTTP router',
        goal: 'Prove you can find entry points fast.',
        prompt: 'Show me where the HTTP routes are registered and list the most important endpoints. Point to the file and function names.',
      },
      {
        title: 'Explain the agent loop',
        goal: 'Narrate the planâ†’executeâ†’criticâ†’repair cycle like a systems engineer.',
        prompt: 'Explain how the orchestrator state machine works (nodes, transitions, termination conditions). Cite which files implement which parts.',
      },
      {
        title: 'Demonstrate eval-driven trust',
        goal: 'Show reproducibility and safety.',
        prompt: 'Run the quick eval suite and summarize what it validates. If something fails, explain likely causes and how you would debug.',
      },
      {
        title: 'Grounded research contract',
        goal: 'Show anti-hallucination architecture.',
        prompt: 'Explain how grounded research is enforced and how facts are tracked and surfaced. Show where the contract is implemented.',
      },
    ];

    async function renderLabs() {
      setTitle('Hands-on Labs');
      $('content').innerHTML = [
        makeCard('How to use these', `
          <p>Each lab is a practice prompt. You can run it in Chat UI, or run it right here and then jump to <span class="kbd">Run Replay</span> to inspect plan + artifacts.</p>
        `),
        `<div class="card">
          <h2>Labs</h2>
          <div id="labsList"></div>
        </div>`,
      ].join('');

      const mount = $('labsList');
      mount.innerHTML = LABS.map((l, idx) => `
        <div class="card" style="margin:10px 0; background:var(--surface2)">
          <h3>${esc(idx + 1 + '. ' + l.title)}</h3>
          <p><strong>Goal:</strong> ${esc(l.goal)}</p>
          <div class="code">${esc(l.prompt)}</div>
          <div class="mutedRow">
            <button class="btn primary" onclick="copyText(${JSON.stringify(l.prompt)})">Copy prompt</button>
            <button class="btn" onclick="runPracticePrompt(${JSON.stringify(l.prompt)}, 'labOut_${idx}')">Run here</button>
            <a class="linkBtn" href="/" style="padding:7px 10px">Open Chat UI</a>
          </div>
          <div id="labOut_${idx}"></div>
        </div>
      `).join('');
    }
    async function renderDoc(path, title) {
      setTitle(title);
      $('content').innerHTML = makeCard(title, `<div class="note">Loading <span class="kbd">${esc(path)}</span>â€¦</div>`);
      try {
        const j = await fetchJson(`/learn/file?path=${encodeURIComponent(path)}`);
        const note = j.truncated ? `<span class="tag"><strong>note</strong> truncated</span>` : '';
        const emb = j.embedded ? `<span class="tag"><strong>source</strong> embedded</span>` : `<span class="tag"><strong>source</strong> repo</span>`;
        const meta = `<div class="docMeta">${emb}${note}<span class="tag"><strong>path</strong> ${esc(path)}</span></div>`;
        $('content').innerHTML = makeCard(title, `${meta}${mdToSafeHtml(j.content ?? '')}`);
      } catch (e) {
        $('content').innerHTML = makeCard(title, `<p>Failed to load: ${esc(e?.message ?? e)}</p>`);
      }
    }

    // ---------- Code tour pages ----------
    async function renderCodeFile(path, title) {
      setTitle(title);
      $('content').innerHTML = makeCard(title, `<div class="note">Loading <span class="kbd">${esc(path)}</span>â€¦</div>`);
      try {
        const { file: j, outline } = await fetchFileAndOutline(path);
        $('content').innerHTML = [
          `<div class="card"><h2>${esc(title)}</h2><p>Path: <span class="kbd">${esc(path)}</span></p></div>`,
          renderFileViewer(path, j.content ?? '', j.truncated, null, outline.symbols ?? []),
        ].join('');
        wireOutlineClicks($('content'));
      } catch (e) {
        $('content').innerHTML = makeCard(title, `<p>Failed to load: ${esc(e?.message ?? e)}</p>`);
      }
    }

    function renderOutline(symbols, path) {
      const items = Array.isArray(symbols) ? symbols : [];
      if (!items.length) return `<div class="note">No symbols found.</div>`;
      return `
        <div class="outline">
          ${items.map(s => `
            <div class="outlineItem" data-path="${esc(path)}" data-line="${esc(s.line)}">
              <span class="outlineKind">${esc(s.kind)}</span>
              <span class="outlineName">${esc(s.name)}</span>
              <span class="outlineLine">:${esc(s.line)}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function wireOutlineClicks(rootEl) {
      for (const el of rootEl.querySelectorAll('.outlineItem')) {
        el.onclick = () => {
          const p = el.dataset.path;
          const ln = parseInt(el.dataset.line || '0', 10) || null;
          openRepoFile(p, ln);
        };
      }
    }

    function renderFileViewer(path, content, truncated, highlightLine, symbols) {
      const lines = (content ?? '').split('\\n');
      const maxLines = 2200;
      const shown = lines.slice(0, maxLines);
      const isTrunc = truncated || lines.length > maxLines;
      let html = '';
      for (let i = 0; i < shown.length; i++) {
        const ln = i + 1;
        const cls = (highlightLine === ln) ? ' style="background:rgba(201,123,75,0.12)"' : '';
        html += `<div${cls}><span class="ln">${ln.toString().padStart(4,' ')}</span>${esc(shown[i])}</div>`;
      }
      return `
        <div class="card">
          <div id="fileHeader">
            <div id="filePath" title="${esc(path)}">${esc(path)}</div>
            <div style="display:flex; gap:8px; align-items:center">
              <button class="btn" onclick="copyText(${JSON.stringify(path)})">Copy path</button>
              <button class="btn" onclick="copyText(${JSON.stringify(content ?? '')})">Copy file</button>
            </div>
          </div>
          <details style="margin-top:10px" ${Array.isArray(symbols) && symbols.length ? 'open' : ''}>
            <summary>Outline</summary>
            ${renderOutline(symbols, path)}
          </details>
          ${isTrunc ? `<div class="note">Note: file display truncated (for performance). Use your editor for full context.</div>` : ''}
          <div class="code" style="margin-top:10px">${html}</div>
        </div>
      `;
    }

    function copyText(text) {
      navigator.clipboard?.writeText(text).catch(() => {});
    }

    async function renderBrowser() {
      setTitle('Browse + Search');
      $('content').innerHTML = [
        `<div class="card">
          <h2>Repo browser</h2>
          <p>Browse and search the server's repo root from the browser. This is read-only and intended for interview prep.</p>
          <div class="mutedRow">
            <span class="tag"><strong>Tree</strong> <span class="kbd">GET /learn/tree</span></span>
            <span class="tag"><strong>File</strong> <span class="kbd">GET /learn/file?path=â€¦</span></span>
            <span class="tag"><strong>Search</strong> <span class="kbd">GET /learn/search?q=â€¦</span></span>
          </div>
        </div>`,
        `<div class="card">
          <div id="browserTop">
            <input id="searchBox" class="input" placeholder="Search repo (substring)â€¦" />
            <button id="searchBtn" class="btn primary">Search</button>
            <button id="refreshTreeBtn" class="btn">Refresh tree</button>
          </div>
          <div class="split">
            <div>
              <h3 style="margin:0 0 8px 0">Tree</h3>
              <div id="tree"><div class="note">Loadingâ€¦</div></div>
            </div>
            <div>
              <h3 style="margin:0 0 8px 0">Results</h3>
              <div id="results"><div class="note">Type a query and hit Search.</div></div>
            </div>
          </div>
        </div>`,
        `<div id="fileMount"></div>`,
      ].join('');

      $('searchBtn').onclick = () => runRepoSearch();
      $('searchBox').onkeydown = (e) => { if (e.key === 'Enter') runRepoSearch(); };
      $('refreshTreeBtn').onclick = () => loadTree();

      await loadTree();
    }

    let lastOpenedPath = null;
    /**
     * Opens a repo file inside the Browser page (tree + file viewer).
     *
     * Important: `#fileMount` only exists on the Browser route. If a lesson’s
     * “Open …” button is clicked from a different route, we navigate first.
     */
    async function openRepoFile(path, highlightLine) {
      lastOpenedPath = path;
      // If we're not currently on the Browser page, navigate there first so #fileMount exists.
      if (!$('fileMount')) {
        await navigate('browser', { setHash: true, scrollTop: false });
      }
      for (const el of document.querySelectorAll('.treeRow')) {
        el.classList.toggle('active', el.dataset.path === path);
      }
      try {
        const { file, outline } = await fetchFileAndOutline(path);
        $('fileMount').innerHTML = renderFileViewer(path, file.content ?? '', file.truncated, highlightLine ?? null, outline.symbols ?? []);
        wireOutlineClicks($('fileMount'));
        $('fileMount').scrollIntoView({ block: 'start', behavior: 'smooth' });
      } catch (e) {
        if ($('fileMount')) $('fileMount').innerHTML = `<div class="card"><h2>File</h2><p>Failed: ${esc(e?.message ?? e)}</p></div>`;
      }
    }

    function renderTreeNode(node, depth) {
      const rows = [];
      const indent = '<span class="treeIndent"></span>'.repeat(depth);
      if (node.type === 'dir') {
        const id = 'dir_' + Math.random().toString(36).slice(2);
        const hasChildren = Array.isArray(node.children) && node.children.length > 0;
        rows.push(`<div class="treeRow" data-kind="dir" data-id="${id}">
          ${indent}<span class="treeIcon">â–¸</span><span>${esc(node.name)}</span><span class="treePath">${esc(node.path || '')}</span>
        </div>`);
        if (hasChildren) {
          for (const child of node.children) rows.push(renderTreeNode(child, depth + 1));
        }
      } else {
        rows.push(`<div class="treeRow" data-kind="file" data-path="${esc(node.path)}">
          ${indent}<span class="treeIcon">Â·</span><span>${esc(node.name)}</span><span class="treePath">${esc(node.path || '')}</span>
        </div>`);
      }
      return rows.join('');
    }

    async function loadTree() {
      const tree = $('tree');
      tree.innerHTML = `<div class="note">Loadingâ€¦</div>`;
      try {
        const root = await fetchJson('/learn/tree');
        tree.innerHTML = renderTreeNode(root, 0);
        for (const row of tree.querySelectorAll('.treeRow')) {
          if (row.dataset.kind === 'file') {
            row.onclick = () => openRepoFile(row.dataset.path, null);
          }
        }
      } catch (e) {
        tree.innerHTML = `<div class="note">Failed: ${esc(e?.message ?? e)}</div>`;
      }
    }

    async function runRepoSearch() {
      const q = ($('searchBox').value ?? '').trim();
      const results = $('results');
      if (!q) { results.innerHTML = `<div class="note">Enter a query.</div>`; return; }
      results.innerHTML = `<div class="note">Searchingâ€¦</div>`;
      try {
        const j = await fetchJson(`/learn/search?q=${encodeURIComponent(q)}`);
        const hits = j.matches ?? [];
        if (!hits.length) { results.innerHTML = `<div class="note">No results.</div>`; return; }
        results.innerHTML = hits.map(h => `
          <div class="hit" data-file="${esc(h.file)}" data-line="${esc(h.line)}">
            <span class="file">${esc(h.file)}</span>
            <span class="line">:${esc(h.line)}</span>
            <span class="prev">${esc(h.preview ?? '')}</span>
          </div>
        `).join('');
        for (const el of results.querySelectorAll('.hit')) {
          el.onclick = () => openRepoFile(el.dataset.file, parseInt(el.dataset.line || '0', 10) || null);
        }
      } catch (e) {
        results.innerHTML = `<div class="note">Failed: ${esc(e?.message ?? e)}</div>`;
      }
    }

    // ---------- Router ----------
    const ROUTES = {
      overview:     { title: 'Overview', fn: renderOverview, tab: 'tour' },
      architecture: { title: 'Architecture', fn: renderArchitecture, tab: 'tour' },
      orchestrator: { title: 'Orchestrator', fn: renderOrchestrator, tab: 'tour' },
      tools:        { title: 'Tools + Safety', fn: renderTools, tab: 'tour' },
      memory:       { title: 'Memory + Storage', fn: renderMemory, tab: 'tour' },
      api:          { title: 'HTTP API Tour', fn: renderApi, tab: 'tour' },
      lesson_trace: { title: 'Trace a Request', fn: renderLessonTrace, tab: 'tour' },
      lesson_rust:  { title: 'Rust in this Repo', fn: renderLessonRust, tab: 'tour' },
      lesson_async: { title: 'Async + Concurrency', fn: renderLessonAsync, tab: 'tour' },
      lesson_axum:  { title: 'Axum HTTP Basics', fn: renderLessonAxum, tab: 'tour' },
      lesson_tools: { title: 'Tools + Results', fn: renderLessonTools, tab: 'tour' },
      lesson_memory:{ title: 'SQLite Memory', fn: renderLessonMemory, tab: 'tour' },
      lesson_grounding:{ title: 'Grounding Contract', fn: renderLessonGrounding, tab: 'tour' },
      talktrack:    { title: 'Talk Track', fn: renderTalkTrack, tab: 'tour' },
      questions:    { title: 'Common Questions', fn: renderQuestions, tab: 'tour' },
      checklist:    { title: 'Demo Checklist', fn: renderChecklist, tab: 'tour' },
      diagnostics:  { title: 'Diagnostics', fn: renderDiagnostics, tab: 'tour' },
      metrics:      { title: 'Metrics', fn: renderMetricsPanel, tab: 'tour' },
      replay:       { title: 'Run Replay', fn: renderReplay, tab: 'tour' },
      glossary:     { title: 'Glossary', fn: renderGlossary, tab: 'tour' },
      labs:         { title: 'Hands-on Labs', fn: renderLabs, tab: 'tour' },
      doc_readme:   { title: 'README.md', fn: () => renderDoc('README.md', 'README.md'), tab: 'tour' },
      doc_design:   { title: 'DESIGN.md', fn: () => renderDoc('DESIGN.md', 'DESIGN.md'), tab: 'tour' },
      doc_roadmap:  { title: 'UI_FEATURES_ROADMAP_2026-04-22.md', fn: () => renderDoc('UI_FEATURES_ROADMAP_2026-04-22.md', 'UI_FEATURES_ROADMAP_2026-04-22.md'), tab: 'tour' },
      doc_next:     { title: 'NEXT_STEPS_2026-04-22.md', fn: () => renderDoc('NEXT_STEPS_2026-04-22.md', 'NEXT_STEPS_2026-04-22.md'), tab: 'tour' },
      doc_progress: { title: 'PROGRESS_2026-04-22.md', fn: () => renderDoc('PROGRESS_2026-04-22.md', 'PROGRESS_2026-04-22.md'), tab: 'tour' },
      code_main:    { title: 'src/main.rs', fn: () => renderCodeFile('src/main.rs', 'src/main.rs'), tab: 'code' },
      code_server:  { title: 'src/api/server.rs', fn: () => renderCodeFile('src/api/server.rs', 'src/api/server.rs'), tab: 'code' },
      code_ui:      { title: 'src/api/ui.rs', fn: () => renderCodeFile('src/api/ui.rs', 'src/api/ui.rs'), tab: 'code' },
      code_orch:    { title: 'src/orchestrator.rs', fn: () => renderCodeFile('src/orchestrator.rs', 'src/orchestrator.rs'), tab: 'code' },
      code_executor:{ title: 'src/nodes/executor.rs', fn: () => renderCodeFile('src/nodes/executor.rs', 'src/nodes/executor.rs'), tab: 'code' },
      code_tools:   { title: 'src/tools/', fn: () => renderBrowser(), tab: 'code' }, // browser is more useful than listing a directory file
      code_grounding:{ title: 'src/grounding.rs', fn: () => renderCodeFile('src/grounding.rs', 'src/grounding.rs'), tab: 'code' },
      code_config:  { title: 'src/config.rs', fn: () => renderCodeFile('src/config.rs', 'src/config.rs'), tab: 'code' },
      browser:      { title: 'Browse + Search', fn: renderBrowser, tab: 'code' },
    };

    // Prevent “double renders” when we programmatically set `location.hash`.
    // Without this, setting the hash triggers `hashchange`, which calls `navigate` again.
    let ignoreNextHashChange = false;

    /**
     * Route to a page id in ROUTES (SPA navigation).
     *
     * Options:
     * - `setHash`: update URL hash (default true)
     * - `scrollTop`: scroll to top after render (default true)
     */
    async function navigate(id, opts) {
      const options = { setHash: true, scrollTop: true, ...(opts || {}) };
      const r = ROUTES[id] || ROUTES.overview;
      if (r.tab === 'code') setTab('code'); else setTab('tour');
      setActiveNav(id);
      if (options.setHash && location.hash !== '#' + id) {
        ignoreNextHashChange = true;
        location.hash = '#' + id;
      }
      await r.fn();
      $('pageTitle').textContent = r.title;
      if (options.scrollTop) window.scrollTo({ top: 0, behavior: 'auto' });
      setTimeout(() => { ignoreNextHashChange = false; }, 0);
    }

    function currentPageId() {
      const h = (location.hash || '').replace('#','').trim();
      return ROUTES[h] ? h : 'overview';
    }

    $('tab-tour').onclick = () => { setTab('tour'); };
    $('tab-code').onclick = () => { setTab('code'); };

    $('copyLinkBtn').onclick = () => {
      const url = location.origin + location.pathname + location.hash;
      navigator.clipboard?.writeText(url).catch(() => {});
    };

    $('exportBtn').onclick = async () => {
      // Lightweight â€œcheat sheetâ€ export: one-pager markdown with your current config.
      try {
        const settings = await fetchJson('/settings');
        const health = await fetchJson('/health');
        const md = [
          '# aihomeserver Â· interview cheat sheet',
          '',
          '- Date: ' + new Date().toLocaleString(),
          '- Version: ' + (health.version ?? '?'),
          '- Fast model: ' + (settings.fast_model ?? '?'),
          '- Critic model: ' + (settings.critic_model ?? '?'),
          '- Ollama URL: ' + (settings.ollama_url ?? '?'),
          '- Workspace: ' + (settings.workspace_path ?? '?'),
          '',
          '## Run loop',
          'Planner â†’ Executor â†’ ToolExecution â†’ Critic â†’ Repair/Replan â†’ Finalization',
          '',
          '## Key files',
          '- src/main.rs (wiring)',
          '- src/orchestrator.rs (routing)',
          '- src/nodes/* (planner/executor/tool_execution/critic/repair)',
          '- src/tools/* (capabilities)',
          '- src/memory/* (SQLite stores)',
          '- src/api/server.rs (HTTP API)',
          '',
          '## Demo endpoints',
          '- / (UI)',
          '- /learn (this site)',
          '- /health/deep (eval-backed health)',
          '- /metrics (counters/latencies)',
        ].join('\\n');
        const blob = new Blob([md], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'aihomeserver-cheat-sheet-' + new Date().toISOString().slice(0,10) + '.md';
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 10000);
      } catch (e) {
        alert('Export failed: ' + (e?.message ?? e));
      }
    };

    // Init
    refreshStatus();
    window.addEventListener('hashchange', () => {
      if (ignoreNextHashChange) return;
      navigate(currentPageId(), { setHash: false });
    });
    navigate(currentPageId(), { setHash: false });
  </script>
</body>
